<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login for Employee</title>
    <link rel="stylesheet" href="style/style_login_emp.css">
    <link href='<link href= https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
<img src="images/EarnitWhiteBackgroundGood.png" alt="logo" class="logo">

<div class="wrapper">
    <form id = "login_form" action="">
        <h1>Login for Employee</h1>
        <div class="input-box">
            <input type="text" id = "email" placeholder="Email Address"
                   required>
            <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
            <input type="password" id = "password"
                   placeholder="Password" required>
            <i class='bx bxs-lock-alt'></i>
        </div>

        <div class="remember-forgot">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Login</button><br>
        <a id = "message2"> </a>
    </form>
</div>
<script src="js/EmployeeRequests.js"></script>
</body>

</html>
